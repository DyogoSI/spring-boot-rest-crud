<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Store Pro - Gestão de Stock</title>
    <style>
        /* Estilos base */
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; }
        .container { flex: 1; max-width: 1000px; margin: 40px auto; width: 95%; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; }
        .form-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        input { flex: 1; min-width: 120px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }

        /* Botões */
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 6px; font-weight: 600; }
        .btn-salvar { background: #28a745; color: white; }
        .btn-excluir { background: #dc3545; color: white; }
        .btn-editar { background: #ffc107; }

        /* TABELA E ALERTAS */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #1a73e8; color: white; }

        /* Classe de Alerta Visual (Fundo vermelho claro) */
        .estoque-baixo { background-color: #ffe5e5 !important; color: #b71c1c; font-weight: bold; }
        .badge-alerta { background: #dc3545; color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .badge-ok { background: #28a745; color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📱 Gestão de Inventário e Reposição </h2>

    <div class="form-group">
        <input type="hidden" id="celularId">
        <input type="text" id="marca" placeholder="Marca (ex: Samsung)">
        <input type="text" id="modelo" placeholder="Modelo (ex: S23)">
        <input type="number" id="preco" placeholder="Preço R$">
        <input type="number" id="quantidadeEstoque" placeholder="Qtd em Estoque">
        <input type="number" id="estoqueMinimo" placeholder="Aviso Mínimo">
        <button onclick="salvarCelular()" class="btn-salvar">Salvar no Inventário</button>
    </div>

    <table>
        <thead>
        <tr>
            <th>Marca</th>
            <th>Modelo</th>
            <th>Preço</th>
            <th>Estoque</th>
            <th>Mínimo</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<script>
    const API_URL = '/celulares';

    async function carregarCelulares() {
        try {
            const res = await fetch(API_URL);
            const celulares = await res.json();
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = '';

            celulares.forEach(c => {
                // TRATAMENTO PARA NÃO APARECER NULL (Se for null, vira 0)
                const qtd = c.quantidadeEstoque !== null ? c.quantidadeEstoque : 0;
                const min = c.estoqueMinimo !== null ? c.estoqueMinimo : 0;
                const preco = c.preco !== null ? c.preco : 0;

                // Lógica de Alerta: se quantidade for menor que o mínimo
                const estoqueBaixo = qtd < min;
                const classeLinha = estoqueBaixo ? 'estoque-baixo' : '';
                const statusDestaque = estoqueBaixo ? '<span class="badge-alerta">REPOR</span>' : '<span class="badge-ok">OK</span>';

                corpo.innerHTML += `
                    <tr class="${classeLinha}">
                        <td>${c.marca || '-'}</td>
                        <td>${c.modelo || '-'}</td>
                        <td>R$ ${preco.toFixed(2)}</td>
                        <td>${qtd}</td>
                        <td>${min}</td>
                        <td>${statusDestaque}</td>
                        <td>
                            <button class="btn-editar" onclick="prepararEdicao(${c.id}, '${c.marca}', '${c.modelo}', ${preco}, ${qtd}, ${min})">📝</button>
                            <button class="btn-excluir" onclick="deletarCelular(${c.id})">🗑️</button>
                        </td>
                    </tr>`;
            });
        } catch (error) {
            console.error("Erro ao carregar dados:", error);
        }
    }

    async function salvarCelular() {
        const id = document.getElementById('celularId').value;

        // Captura os dados garantindo que são números
        const dados = {
            marca: document.getElementById('marca').value,
            modelo: document.getElementById('modelo').value,
            preco: parseFloat(document.getElementById('preco').value) || 0,
            quantidadeEstoque: parseInt(document.getElementById('quantidadeEstoque').value) || 0,
            estoqueMinimo: parseInt(document.getElementById('estoqueMinimo').value) || 0
        };

        const metodo = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/${id}` : API_URL;

        try {
            const response = await fetch(url, {
                method: metodo,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });

            if (response.ok) {
                limparFormulario();
                carregarCelulares();
            } else {
                alert("Erro ao salvar! Verifique se o Backend está rodando.");
            }
        } catch (error) {
            console.error("Erro na requisição:", error);
        }
    }

    function prepararEdicao(id, marca, modelo, preco, qtd, min) {
        document.getElementById('celularId').value = id;
        document.getElementById('marca').value = marca;
        document.getElementById('modelo').value = modelo;
        document.getElementById('preco').value = preco;
        document.getElementById('quantidadeEstoque').value = qtd;
        document.getElementById('estoqueMinimo').value = min;
        window.scrollTo(0, 0); // Sobe a página para o formulário
    }

    async function deletarCelular(id) {
        if(confirm('Deseja excluir este item do estoque?')) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            carregarCelulares();
        }
    }

    function limparFormulario() {
        document.getElementById('celularId').value = '';
        document.getElementById('marca').value = '';
        document.getElementById('modelo').value = '';
        document.getElementById('preco').value = '';
        document.getElementById('quantidadeEstoque').value = '';
        document.getElementById('estoqueMinimo').value = '';
    }

    // Inicializa a tabela
    carregarCelulares();
</script>
</body>
</html>
